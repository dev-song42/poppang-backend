<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PopPang Popular Radar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@500&family=Noto+Sans+KR:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f9f4ea;
        --paper: #fffdfa;
        --ink: #17130e;
        --muted: #6a5e4f;
        --line: #ecdcc8;
        --accent: #ff5a2a;
        --accent-soft: #ffd8bf;
        --accent-2: #ffbf1f;
        --cool: #138f87;
        --card: #fff7ec;
        --error-bg: #fff2f2;
        --error-line: #f0a7a7;
        --error-ink: #7a2222;
        --shadow-lg: 0 16px 44px rgba(31, 22, 12, 0.1);
        --shadow-sm: 0 8px 20px rgba(31, 22, 12, 0.07);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        color: var(--ink);
        font-family: "Noto Sans KR", sans-serif;
        background:
          radial-gradient(circle at 10% 0%, rgba(255, 191, 31, 0.27), transparent 32%),
          radial-gradient(circle at 100% 90%, rgba(19, 143, 135, 0.14), transparent 36%),
          linear-gradient(180deg, #fff9ef, #f8f2e8 52%, #f7efe2),
          var(--bg);
      }

      .grain {
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.08;
        background-image: radial-gradient(#000 0.4px, transparent 0.4px);
        background-size: 3px 3px;
      }

      .shell {
        width: min(1160px, calc(100% - 28px));
        margin: 26px auto 90px;
        display: grid;
        gap: 14px;
      }

      .hero {
        border-radius: 24px;
        border: 1px solid var(--line);
        background:
          linear-gradient(120deg, rgba(255, 255, 255, 0.96), rgba(255, 243, 226, 0.9)),
          var(--paper);
        box-shadow: var(--shadow-lg);
        overflow: hidden;
        position: relative;
        animation: rise 0.5s ease-out both;
      }

      .hero::before {
        content: "";
        position: absolute;
        right: -80px;
        top: -80px;
        width: 210px;
        height: 210px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(255, 191, 31, 0.32), transparent 68%);
      }

      .hero-inner {
        position: relative;
        display: grid;
        gap: 18px;
        padding: 26px;
      }

      .hero-chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        width: fit-content;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 8px 12px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
        color: var(--muted);
        background: rgba(255, 255, 255, 0.86);
      }

      .hero-chip::before {
        content: "";
        width: 7px;
        height: 7px;
        border-radius: 999px;
        background: linear-gradient(120deg, var(--accent), var(--accent-2));
      }

      .hero h1 {
        margin: 0;
        font-family: "Space Grotesk", sans-serif;
        font-size: clamp(32px, 8vw, 62px);
        line-height: 0.96;
        letter-spacing: -0.03em;
      }

      .hero p {
        margin: 0;
        color: var(--muted);
        font-size: 15px;
        line-height: 1.5;
        max-width: 740px;
      }

      .hero-metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .hero-metric {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        background: rgba(255, 255, 255, 0.9);
      }

      .hero-metric span {
        display: block;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .hero-metric strong {
        display: block;
        margin-top: 5px;
        font-family: "Space Grotesk", sans-serif;
        font-size: 23px;
        line-height: 1.1;
      }

      .panel {
        border-radius: 18px;
        border: 1px solid var(--line);
        background: var(--paper);
        box-shadow: var(--shadow-sm);
        padding: 14px;
        animation: rise 0.54s ease-out both;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }

      .status {
        flex: 1;
        color: var(--muted);
        font-size: 14px;
        min-width: 220px;
      }

      .control {
        appearance: none;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        color: var(--ink);
        padding: 9px 11px;
        font-size: 14px;
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
      }

      .btn {
        border: 1px solid var(--line);
        border-radius: 10px;
        background: #fff;
        color: var(--ink);
        padding: 9px 13px;
        font-family: "Space Grotesk", sans-serif;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: transform 0.14s ease, box-shadow 0.2s ease;
      }

      .btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .btn:not(:disabled):hover {
        transform: translateY(-1px);
        box-shadow: 0 9px 16px rgba(22, 16, 10, 0.1);
      }

      .btn-primary {
        border-color: transparent;
        color: #fff;
        background: linear-gradient(90deg, var(--accent), #ff8135);
      }

      .dash {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .stat {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 12px;
        background: #fff;
      }

      .stat .k {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .stat .v {
        margin-top: 5px;
        font-family: "Space Grotesk", sans-serif;
        font-size: 25px;
        line-height: 1.1;
      }

      .meta-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 10px;
      }

      .meta-item {
        border: 1px dashed var(--line);
        border-radius: 12px;
        padding: 11px;
        background: rgba(255, 255, 255, 0.75);
      }

      .meta-item .k {
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
      }

      .meta-item .v {
        margin-top: 6px;
        font-family: "Space Grotesk", sans-serif;
        font-size: 15px;
        word-break: break-all;
      }

      .mono {
        font-family: "IBM Plex Mono", monospace;
      }

      .list-wrap {
        border-radius: 18px;
        border: 1px solid var(--line);
        background: var(--paper);
        padding: 14px;
        box-shadow: var(--shadow-sm);
        animation: rise 0.58s ease-out both;
      }

      .error {
        display: none;
        margin-bottom: 10px;
        border-radius: 10px;
        border: 1px solid var(--error-line);
        background: var(--error-bg);
        color: var(--error-ink);
        padding: 10px 12px;
        font-size: 14px;
      }

      .cards {
        display: grid;
        gap: 11px;
        grid-template-columns: 1fr;
      }

      .card {
        border-radius: 14px;
        border: 1px solid var(--line);
        background:
          linear-gradient(130deg, rgba(255, 248, 238, 0.96), rgba(255, 255, 255, 0.94)),
          var(--card);
        padding: 12px;
        opacity: 0;
        transform: translateY(10px);
        animation: cardIn 0.35s ease forwards;
      }

      .card-head {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }

      .rank {
        width: 48px;
        height: 48px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        color: #4c3003;
        font-family: "Space Grotesk", sans-serif;
        font-size: 19px;
        font-weight: 700;
        background: linear-gradient(135deg, var(--accent-2), #ffdd74);
        box-shadow: inset 0 -10px 20px rgba(255, 255, 255, 0.45);
      }

      .name {
        margin: 0;
        font-size: 18px;
        line-height: 1.25;
      }

      .sub {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 12px;
        font-family: "IBM Plex Mono", monospace;
      }

      .meter {
        position: relative;
        margin-top: 9px;
        height: 8px;
        border-radius: 999px;
        background: #f5e7d4;
        overflow: hidden;
      }

      .meter span {
        position: absolute;
        inset: 0 auto 0 0;
        width: 0;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--cool), #2cc6bc);
        animation: fill 0.7s ease-out forwards;
      }

      .row {
        margin-top: 9px;
        display: grid;
        gap: 8px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .chip {
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #fff;
        padding: 8px;
      }

      .chip .k {
        display: block;
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
      }

      .chip .v {
        display: block;
        margin-top: 4px;
        font-family: "Space Grotesk", sans-serif;
        font-size: 15px;
      }

      .empty {
        border-radius: 14px;
        border: 1px dashed var(--line);
        color: var(--muted);
        text-align: center;
        padding: 30px 12px;
      }

      @media (min-width: 760px) {
        .shell {
          width: min(1160px, calc(100% - 44px));
          margin-top: 36px;
          gap: 16px;
        }

        .hero-inner {
          padding: 30px;
        }

        .cards {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .dash {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .meta-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (min-width: 1080px) {
        .cards {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @keyframes rise {
        from {
          opacity: 0;
          transform: translateY(14px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes cardIn {
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes fill {
        from {
          width: 0;
        }
        to {
          width: var(--w, 0%);
        }
      }
    </style>
  </head>
  <body>
    <div class="grain"></div>
    <main class="shell">
      <header class="hero">
        <div class="hero-inner">
          <span class="hero-chip">POPULAR SNAPSHOT FEED</span>
          <h1>PopPang Radar</h1>
          <p>
            인기 팝업 커서 페이지네이션(`/api/v1/popup/popular`)을 바로 검증할 수 있는 대시보드입니다.
            현재 스냅샷, 커서 상태, 누적 통계를 같이 보여줍니다.
          </p>

          <div class="hero-metrics">
            <div class="hero-metric">
              <span>Snapshot</span>
              <strong id="heroSnapshot">-</strong>
            </div>
            <div class="hero-metric">
              <span>Loaded</span>
              <strong id="heroLoaded">0</strong>
            </div>
            <div class="hero-metric">
              <span>Has Next</span>
              <strong id="heroHasNext">-</strong>
            </div>
          </div>
        </div>
      </header>

      <section class="panel">
        <div class="toolbar">
          <span class="status" id="statusText">불러오는 중...</span>
          <select class="control" id="limitSelect" aria-label="페이지 크기">
            <option value="3">Limit 3</option>
            <option value="6">Limit 6</option>
            <option value="9" selected>Limit 9</option>
            <option value="12">Limit 12</option>
            <option value="20">Limit 20</option>
          </select>
          <button class="btn" id="refreshBtn" type="button">처음부터</button>
          <button class="btn btn-primary" id="moreBtn" type="button">다음 페이지</button>
        </div>
      </section>

      <section class="panel">
        <div class="dash">
          <article class="stat">
            <span class="k">누적 카드 수</span>
            <strong class="v" id="statLoaded">0</strong>
          </article>
          <article class="stat">
            <span class="k">누적 총 조회수 합</span>
            <strong class="v" id="statTotalSum">0</strong>
          </article>
          <article class="stat">
            <span class="k">평균 총 조회수</span>
            <strong class="v" id="statAvgTotal">0</strong>
          </article>
          <article class="stat">
            <span class="k">최대 스냅샷 조회수</span>
            <strong class="v" id="statMaxSnapshot">0</strong>
          </article>
        </div>
      </section>

      <section class="panel">
        <div class="meta-grid">
          <div class="meta-item">
            <span class="k">현재 Snapshot ID</span>
            <div class="v mono" id="metaSnapshot">-</div>
          </div>
          <div class="meta-item">
            <span class="k">다음 Cursor 길이</span>
            <div class="v mono" id="metaCursorLen">0</div>
          </div>
          <div class="meta-item">
            <span class="k">다음 Cursor(축약)</span>
            <div class="v mono" id="metaCursor">-</div>
          </div>
          <div class="meta-item">
            <span class="k">최근 요청 시각</span>
            <div class="v mono" id="metaFetchedAt">-</div>
          </div>
        </div>
      </section>

      <section class="list-wrap">
        <div class="error" id="errorBox"></div>
        <div class="cards" id="popularList"></div>
      </section>
    </main>

    <script>
      const state = {
        limit: 9,
        nextCursor: null,
        hasNext: true,
        loaded: 0,
        loading: false,
        items: [],
        snapshotId: null,
        lastFetchedAt: null,
        requestCount: 0,
      };

      const popularList = document.getElementById("popularList");
      const statusText = document.getElementById("statusText");
      const errorBox = document.getElementById("errorBox");
      const refreshBtn = document.getElementById("refreshBtn");
      const moreBtn = document.getElementById("moreBtn");
      const limitSelect = document.getElementById("limitSelect");

      const heroSnapshot = document.getElementById("heroSnapshot");
      const heroLoaded = document.getElementById("heroLoaded");
      const heroHasNext = document.getElementById("heroHasNext");

      const statLoaded = document.getElementById("statLoaded");
      const statTotalSum = document.getElementById("statTotalSum");
      const statAvgTotal = document.getElementById("statAvgTotal");
      const statMaxSnapshot = document.getElementById("statMaxSnapshot");

      const metaSnapshot = document.getElementById("metaSnapshot");
      const metaCursorLen = document.getElementById("metaCursorLen");
      const metaCursor = document.getElementById("metaCursor");
      const metaFetchedAt = document.getElementById("metaFetchedAt");

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function toNumber(value) {
        const n = Number(value);
        return Number.isFinite(n) ? n : 0;
      }

      function formatNumber(value) {
        return toNumber(value).toLocaleString("ko-KR");
      }

      function formatDateTime(date) {
        if (!date) {
          return "-";
        }
        return new Intl.DateTimeFormat("ko-KR", {
          dateStyle: "short",
          timeStyle: "medium",
        }).format(date);
      }

      function shortenCursor(cursor) {
        if (!cursor) {
          return "-";
        }
        if (cursor.length <= 58) {
          return cursor;
        }
        return cursor.slice(0, 30) + " ... " + cursor.slice(-20);
      }

      function setLoading(on) {
        state.loading = on;
        refreshBtn.disabled = on;
        moreBtn.disabled = on || !state.hasNext;
        limitSelect.disabled = on;
      }

      function setError(message) {
        if (!message) {
          errorBox.style.display = "none";
          errorBox.textContent = "";
          return;
        }
        errorBox.style.display = "block";
        errorBox.textContent = message;
      }

      function updateMeta() {
        const totalItems = state.items.length;
        const totalSum = state.items.reduce((sum, item) => sum + toNumber(item.totalViewCount), 0);
        const avgTotal = totalItems ? Math.round(totalSum / totalItems) : 0;
        const maxSnapshotValue = state.items.reduce(
          (max, item) => Math.max(max, toNumber(item.viewCountSnapshot)),
          0,
        );

        const hasNextText = state.hasNext ? "YES" : "NO";
        const nextText = state.hasNext ? "다음 페이지 있음" : "마지막 페이지";

        heroSnapshot.textContent = state.snapshotId ?? "-";
        heroLoaded.textContent = formatNumber(totalItems);
        heroHasNext.textContent = hasNextText;

        statLoaded.textContent = formatNumber(totalItems);
        statTotalSum.textContent = formatNumber(totalSum);
        statAvgTotal.textContent = formatNumber(avgTotal);
        statMaxSnapshot.textContent = formatNumber(maxSnapshotValue);

        metaSnapshot.textContent = state.snapshotId ?? "-";
        metaCursorLen.textContent = String(state.nextCursor ? state.nextCursor.length : 0);
        metaCursor.textContent = shortenCursor(state.nextCursor);
        metaFetchedAt.textContent = formatDateTime(state.lastFetchedAt);

        statusText.textContent =
          "요청 " +
          state.requestCount +
          "회 · 누적 " +
          totalItems +
          "개 · " +
          nextText +
          " · limit " +
          state.limit;
      }

      function renderItems() {
        if (state.items.length === 0) {
          popularList.innerHTML = '<div class="empty">표시할 인기 팝업 데이터가 없습니다.</div>';
          return;
        }

        const maxSnapshotValue = Math.max(
          1,
          ...state.items.map((item) => toNumber(item.viewCountSnapshot)),
        );

        const html = state.items
          .map((item, idx) => {
            const rank = idx + 1;
            const snapshot = toNumber(item.viewCountSnapshot);
            const meterWidth = Math.max(5, Math.round((snapshot / maxSnapshotValue) * 100));

            return `
              <article class="card" style="animation-delay:${(idx % 12) * 0.04}s">
                <div class="card-head">
                  <div class="rank">#${rank}</div>
                  <div>
                    <h2 class="name">${escapeHtml(item.name ?? "이름 없음")}</h2>
                    <p class="sub">popup_id: ${escapeHtml(item.id ?? "-")}</p>
                  </div>
                </div>
                <div class="meter"><span style="--w:${meterWidth}%"></span></div>
                <div class="row">
                  <div class="chip">
                    <span class="k">총 조회수</span>
                    <span class="v">${formatNumber(item.totalViewCount)}</span>
                  </div>
                  <div class="chip">
                    <span class="k">스냅샷 조회수</span>
                    <span class="v">${formatNumber(item.viewCountSnapshot)}</span>
                  </div>
                </div>
              </article>
            `;
          })
          .join("");

        popularList.innerHTML = html;
      }

      async function loadPopular(reset) {
        if (state.loading) {
          return;
        }

        if (reset) {
          state.items = [];
          state.loaded = 0;
          state.nextCursor = null;
          state.hasNext = true;
          state.snapshotId = null;
          state.lastFetchedAt = null;
          state.requestCount = 0;
        }

        setLoading(true);
        setError("");

        try {
          const query = new URLSearchParams();
          query.set("limit", String(state.limit));
          if (!reset && state.nextCursor) {
            query.set("cursor", state.nextCursor);
          }

          const response = await fetch("/api/v1/popup/popular?" + query.toString(), {
            method: "GET",
            headers: { Accept: "application/json" },
          });

          if (!response.ok) {
            throw new Error("HTTP " + response.status);
          }

          const data = await response.json();
          const items = Array.isArray(data?.items) ? data.items : [];
          const pageInfo = data?.pageInfo ?? {};

          if (reset) {
            state.items = items;
          } else {
            state.items = state.items.concat(items);
          }

          state.loaded = state.items.length;
          state.hasNext = Boolean(pageInfo.hasNext);
          state.nextCursor = pageInfo.nextCursor ?? null;
          state.snapshotId = pageInfo.snapshotId ?? state.snapshotId;
          state.lastFetchedAt = new Date();
          state.requestCount += 1;

          renderItems();
          updateMeta();
        } catch (error) {
          const message = error instanceof Error ? error.message : "알 수 없는 오류";
          setError("데이터를 불러오지 못했습니다. " + message);
          renderItems();
          updateMeta();
        } finally {
          setLoading(false);
        }
      }

      refreshBtn.addEventListener("click", () => loadPopular(true));
      moreBtn.addEventListener("click", () => loadPopular(false));
      limitSelect.addEventListener("change", (event) => {
        state.limit = Number(event.target.value);
        loadPopular(true);
      });

      updateMeta();
      loadPopular(true);
    </script>
  </body>
</html>
